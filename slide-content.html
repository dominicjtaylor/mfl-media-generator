<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carousel Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@300;400;500;600&family=Allura&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
  }

  body {
    font-family: "Inter", sans-serif;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #e9d6cc;
    position: relative;
    overflow: hidden;
  }

  /* ---------- FLAG (TOP LEFT) ---------- */

  .flag {
    margin-bottom: 30px;
  }

  .flag img {
    width: 220px; /* adjust as needed */
    height: auto;
    transform: rotate(-15deg);
    transform-origin: center;
  }

  /* ---------- CENTER CONTENT ---------- */

  .content {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 80%;

    display: flex;
    flex-direction: column;
    align-items: flex-start; left aligned
  }

  .text {
    font-family: "Playfair Display", serif;
    margin-top: 30px;
    font-size: 50px;
    font-weight: 400;
    line-height: 1.3;
    color: #6e3b34;
  }

  .text strong {
    font-weight:700;
  }

  /* ---------- CURSIVE ACCENT ---------- */

  .accent {
    font-family: "Allura", cursive;
    font-size: 160px;
    line-height: 0.9;
    display: inline-block;
  }

  .underline {
    text-decoration: underline;
  }

  .swipe {
    margin-top: 0px;
    margin-left: 700px;
    display:inline-block;
    border:1px solid #6e3b34;
    border-radius:999px;
    padding:6px 18px;
    font-size:14px;
    letter-spacing:3px;
    color:#6e3b34;;
  }

  /* ---------- FOOTER ---------- */

  .footer {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    color: #6e3b34;
    opacity: 0.8;
    z-index: 2;
  }

</style>
</head>

<body>

<div class="slide">

  <div class="content">
    {{FLAG_BLOCK}}

    <div class="swipe">SWIPE</div>

    <div class="text">{{TEXT}}</div>
  </div>

  <div class="footer">@tutor_mia_mfl</div>

</div>

</body>
</html>
