<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carousel Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&family=Allura&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Inter", sans-serif;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #e9d6cc;
    position: relative;
    overflow: hidden;
  }

  /* ---------- FLAG (TOP LEFT) ---------- */

  .flag {
    position: absolute;
    top: 100px;
    left: 40px;
    z-index: 3;
  }

  .flag img {
    width: 120px; /* adjust as needed */
    height: auto;
    transform: rotate(-15deg);
    transform-origin: center;
  }

  /* ---------- CENTER CONTENT ---------- */

  .content {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: left;
    width: 80%;
    z-index: 2;
  }

  .title {
    font-family: "Playfair Display", serif;
    font-size: 65px;
    line-height: 1.3;
    color: #6e3b34;
  }

  .text {
    font-family: "Playfair Display", serif;
    font-size: 60px;
    line-height: 1.3;
    color: #6e3b34;
  }

  /* ---------- CURSIVE ACCENT ---------- */

  .accent {
    font-family: "Allura", cursive;
    font-size: 160px;
    line-height: 0.9;
    display: inline-block;
  }

  .underline {
    text-decoration: underline;
  }

  .swipe {
    margin-top: 120px;
    margin-left: 850px;
    display:inline-block;
    border:1px solid #6e3b34;
    border-radius:999px;
    padding:6px 18px;
    font-size:14px;
    letter-spacing:3px;
    color:#6e3b34;;
  }

  /* ---------- BIG BACKGROUND NUMBER ---------- */

  .big-number {
    position: absolute;
    right: 60px;
    bottom: 120px;

    font-size: 300px;
    line-height: 0.8;
    font-weight: 600;

    color: #6e3b34;
    opacity: 0.08;

    pointer-events: none;
    user-select: none;
    z-index: 1;
  }

  /* ---------- FOOTER ---------- */

  .footer {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    color: #6e3b34;
    opacity: 0.8;
    z-index: 2;
  }

</style>
</head>

<body>

<div class="slide">

  <!-- FLAG -->
  <div class="flag">
    <img src="spain.png" alt="flag">
  </div>

  <div class="swipe">SWIPE</div>

  <!-- BIG NUMBER -->
  <div class="big-number">01</div>

  <div class="content">
    <div class="text">
      This is a <span class="accent">content</span> slide<br/>
      for the <span class="underline">MFL carousel</span>
    </div>
  </div>

  <div class="footer">@tutor_mia_mfl</div>

</div>

</body>
</html>
