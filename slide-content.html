<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carousel Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&family=Allura&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Inter", sans-serif;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #e9d6cc;
    position: relative;
    overflow: hidden;
  }

  /* ---------- TOP ICON (NO ROTATION) ---------- */

  .top-icon {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.22;
  }

  .top-icon svg {
    width: 120px;
    height: 120px;
    stroke: #6e3b34;
    fill: none;
    stroke-width: 1.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---------- CENTER CONTENT ---------- */

  .content {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
    z-index: 2;
  }

  .title {
    font-family: "Playfair Display", serif;
    font-size: 65px;
    line-height: 1.3;
    color: #6e3b34;
  }

  /* ---------- CURSIVE ACCENT ---------- */

  .accent {
    font-family: "Allura", cursive;
    font-size: 160px; /* your requested size */
    line-height: 0.9;
    display: inline-block;
  }

  .underline {
    text-decoration: underline;
  }

  /* ---------- BIG BACKGROUND NUMBER ---------- */

  .big-number {
    position: absolute;
    right: 60px;
    bottom: 80px;

    font-size: 300px;
    line-height: 0.8;
    font-weight: 600;

    color: #6e3b34;
    opacity: 0.08;

    pointer-events: none;
    user-select: none;
    z-index: 1;
  }

  /* ---------- FOOTER ---------- */

  .footer {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    color: #6e3b34;
    opacity: 0.8;
    z-index: 2;
  }

</style>
</head>

<body>

<div class="slide">

  <!-- SEND ICON -->
  <div class="top-icon">
    <svg viewBox="0 0 24 24">
      <path d="M22 2L11 13"></path>
      <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
    </svg>
  </div>

  <!-- BIG NUMBER -->
  <div class="big-number">01</div>

  <div class="content">
    <div class="title">
      This is a <span class="accent">content</span> slide<br/>
      for the <span class="underline">MFL carousel</span>
    </div>
  </div>

  <div class="footer">@yourhandle</div>

</div>

</body>
</html>
