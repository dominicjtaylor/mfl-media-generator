<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carousel Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@300;400;500;600&family=Allura&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1080px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
  }

  body {
    font-family: "Inter", sans-serif;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #e9d6cc;
    position: relative;
    overflow: hidden;
  }

  .content {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
  }

  .title {
    margin-top: 50px;
    font-family: "Playfair Display", serif;
    font-size: 65px;
    line-height: 1.3;
    font-weight: 400;
    color: #6e3b34;
  }

  .title strong {
    font-weight:700;
  }

  .accent {
    font-family: "Allura", cursive;
    font-size: 160px; /* slightly reduced for balance */
    line-height: 0.9;
    display: inline-block;
  }

  .underline {
    text-decoration: underline;
  }

  .swipe {
    margin-top: 0px;
    margin-left: -580px;
    display:inline-block;
    border:1px solid #6e3b34;
    border-radius:999px;
    padding:6px 18px;
    font-size:14px;
    letter-spacing:3px;
    color:#6e3b34;;
  }

  /* Footer handle */
  .footer {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    color: #6e3b34;
    opacity: 0.8;
  }

</style>
</head>

<body>

<div class="slide">


  <div class="content">
    <div class="swipe">SWIPE</div>

    <div class="title">{{TEXT}}</div>
  </div>

  <div class="footer">@tutor_mia_mfl</div>

</div>

</body>
</html>
