<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Two Column Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Inter", sans-serif;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #e9d6cc;
    position: relative;
    overflow: hidden;
  }

  /* ---------- TWO COLUMN LAYOUT ---------- */

  .columns {
    position: absolute;
    top: 47%; /* slight shift down to create space for titles */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
    height: 60%;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    z-index: 2;
  }

  .column {
    width: 45%;
    display: flex;
    flex-direction: column;
    align-items: center; /* keeps title centered */
  }

  .column-title {
    font-family: "Inter", sans-serif;
    font-size: 40px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 60px; /* increased gap */
    color: #6e3b34;
    opacity: 0.85;
    text-align: center;
  }

  .column-text {
    font-family: "Playfair Display", serif;
    font-size: 58px;
    line-height: 1.3;
    color: #6e3b34;
    text-align: left; /* left-align text */
    width: 100%;
  }

  /* ---------- DIVIDER LINE ---------- */

  .divider {
    width: 2px;
    height: 100%;
    background: #6e3b34;
    opacity: 0.3;
  }

  /* ---------- FOOTER ---------- */

  .footer {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    color: #6e3b34;
    opacity: 0.8;
    z-index: 2;
  }

</style>
</head>

<body>

<div class="slide">

  <!-- TWO COLUMNS -->
  <div class="columns">

    <div class="column">
      <div class="column-title">English</div>
      <div class="column-text">{{LEFT_TEXT}}</div>
    </div>

    <div class="divider"></div>

    <div class="column">
      <div class="column-title">{{LANGUAGE_TITLE}}</div>
      <div class="column-text">{{RIGHT_TEXT}}</div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">@tutor_mia_mfl</div>

</div>

</body>
</html>
